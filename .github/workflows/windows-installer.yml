name: Windows Installer

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756  # v1

      - name: Install Qt6
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730  # v4.3.1
        with:
          version: '6.8.*'
          host: 'windows'
          target: 'desktop'
          # Qt 6.8 LTS dropped MSVC 2019 builds — arch must be msvc2022.
          arch: 'win64_msvc2022_64'
          modules: 'qtmultimedia qtserialport qtwebsockets qtshadertools'

      - name: Install Ninja, Inno Setup, and LLVM
        run: choco install ninja innosetup llvm -y

      # zlib is bundled under third_party/zlib (1.3.1) — no vcpkg install
      # needed; CMake builds zlibstatic from source.  (#2651)

      # Each third-party dep is cached against the hash of its setup
      # script (which pins the version), so cache invalidates the moment
      # we bump a version.  Skips the upstream download + build entirely
      # on cache hit.
      - name: Cache Opus
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        id: cache-opus
        with:
          path: third_party/opus
          key: opus-${{ runner.os }}-${{ hashFiles('scripts/setup/setup-opus.ps1') }}

      - name: Setup Opus (SmartLink audio codec)
        if: steps.cache-opus.outputs.cache-hit != 'true'
        run: .\scripts\setup\setup-opus.ps1

      - name: Cache FFTW3
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        id: cache-fftw
        with:
          path: third_party/fftw3
          key: fftw-${{ runner.os }}-${{ hashFiles('scripts/setup/setup-fftw.ps1') }}

      - name: Setup FFTW3 float (NR4 dependency)
        if: steps.cache-fftw.outputs.cache-hit != 'true'
        run: .\scripts\setup\setup-fftw.ps1

      - name: Cache hidapi
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        id: cache-hidapi
        with:
          path: third_party/hidapi
          key: hidapi-${{ runner.os }}-${{ hashFiles('scripts/setup/setup-hidapi.ps1') }}

      - name: Setup hidapi (USB HID device support)
        if: steps.cache-hidapi.outputs.cache-hit != 'true'
        run: .\scripts\setup\setup-hidapi.ps1

      - name: Cache DeepFilterNet3
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        id: cache-deepfilter
        with:
          path: third_party/deepfilter
          key: deepfilter-${{ runner.os }}-${{ hashFiles('scripts/setup/setup-deepfilter.ps1') }}

      - name: Setup DeepFilterNet3 (DFNR)
        if: steps.cache-deepfilter.outputs.cache-hit != 'true'
        run: .\scripts\setup\setup-deepfilter.ps1

      - name: Configure
        run: |
          cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DMQTT_TLS=OFF -DCMAKE_TOOLCHAIN_FILE="$env:CMAKE_TOOLCHAIN_FILE" -DVCPKG_TARGET_TRIPLET="$env:VCPKG_TARGET_TRIPLET"

      - name: Build Opus (RADE dependency)
        # ExternalProject dependency ordering via BUILD_BYPRODUCTS is correct,
        # but a separate step gives clearer CI failure attribution and avoids
        # any Ninja parallel-build ordering edge cases with IMPORTED targets.
        run: cmake --build build --target build_opus -j $env:NUMBER_OF_PROCESSORS

      - name: Build
        run: cmake --build build -j $env:NUMBER_OF_PROCESSORS

      - name: Deploy Qt
        run: |
          mkdir deploy
          copy build\AetherSDR.exe deploy\
          windeployqt deploy\AetherSDR.exe --release --no-translations --no-system-d3d-compiler
          if (Test-Path "third_party\fftw3\bin\libfftw3-3.dll") {
            copy third_party\fftw3\bin\libfftw3-3.dll deploy\
          }
          if (Test-Path "third_party\fftw3\bin\libfftw3f-3.dll") {
            copy third_party\fftw3\bin\libfftw3f-3.dll deploy\
          }
          if (Test-Path "third_party\hidapi\bin\hidapi.dll") {
            copy third_party\hidapi\bin\hidapi.dll deploy\
          }
          # zlib is statically linked from third_party/zlib (#2651) — no
          # DLL copy needed; zlibstatic is baked into AetherSDR.exe.
          if (Test-Path "third_party\deepfilter\lib\windows-x86_64\deepfilter.dll") {
            copy third_party\deepfilter\lib\windows-x86_64\deepfilter.dll deploy\
          }
          # Windows builds embed the DFNR model in AetherSDR.exe resources, so
          # no loose DeepFilterNet3_onnx.tar.gz payload is deployed.
          # NOTE: MQTT TLS is disabled (-DMQTT_TLS=OFF) so no OpenSSL DLLs
          # are needed. This avoids the "libssl-3-x64.dll not found" crash
          # on systems without OpenSSL installed (#1341, #1362).
          if ($false) {
          }

      - name: Verify DPI awareness manifest
        run: powershell -NoProfile -ExecutionPolicy Bypass -File packaging\windows\check-dpi-awareness.ps1 -ExePath deploy\AetherSDR.exe

      - name: Stage MSVC runtime for installer
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File packaging\windows\stage-msvc-runtime.ps1 -OutputDir installer-runtime

      - name: Create portable ZIP
        run: |
          # Keep portable ZIP app-local runtime behavior aligned with the installer.
          # Sanitize github.ref_name — release-tag pushes give a slash-free
          # "v26.5.3" but workflow_dispatch on a branch ref like
          # "codex/windows-store-msix" injects slashes that break the
          # Compress-Archive destination path.  Strip every filesystem-unsafe
          # character so ad-hoc dispatch runs (e.g. validating new packaging
          # work on a branch) reach the later Inno + MSIX steps instead of
          # exiting 1 at the very first artifact-creation step.
          Copy-Item -Path installer-runtime\*.dll -Destination deploy\ -Force
          $safeRefName = "${{ github.ref_name }}" -replace '[\\/:*?"<>|]', '_'
          Compress-Archive -Path deploy\* -DestinationPath "AetherSDR-$safeRefName-Windows-x64-portable.zip"

      - name: Create installer (Inno Setup)
        run: |
          # Same sanitization as the portable ZIP step — Inno also pukes on
          # filesystem-unsafe characters in /DAPP_VERSION.
          $version = "${{ github.ref_name }}" -replace '^v', '' -replace '[\\/:*?"<>|]', '_'
          $runtimeDir = (Resolve-Path "installer-runtime").Path
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAPP_VERSION=$version "/DVC_RUNTIME_DIR=$runtimeDir" packaging\windows\installer.iss

      # MSIX runs AFTER the portable ZIP + Inno installer steps and is
      # gated with continue-on-error so a future MSIX hiccup (missing SDK
      # tool on a runner image bump, signtool flake, etc.) can't gate the
      # established portable-zip + Inno installer delivery path that real
      # users depend on.  When MSIX matures we can promote it back into
      # the hard-required artifact set.
      - name: Create MSIX package
        continue-on-error: true
        env:
          AETHERSDR_MSIX_IDENTITY_NAME: ${{ vars.AETHERSDR_MSIX_IDENTITY_NAME }}
          AETHERSDR_MSIX_PUBLISHER: ${{ vars.AETHERSDR_MSIX_PUBLISHER }}
          AETHERSDR_MSIX_DISPLAY_NAME: ${{ vars.AETHERSDR_MSIX_DISPLAY_NAME }}
          AETHERSDR_MSIX_PUBLISHER_DISPLAY_NAME: ${{ vars.AETHERSDR_MSIX_PUBLISHER_DISPLAY_NAME }}
          AETHERSDR_MSIX_DESCRIPTION: ${{ vars.AETHERSDR_MSIX_DESCRIPTION }}
          AETHERSDR_MSIX_BACKGROUND_COLOR: ${{ vars.AETHERSDR_MSIX_BACKGROUND_COLOR }}
          AETHERSDR_MSIX_INSTALLER_ACCENT_COLOR: ${{ vars.AETHERSDR_MSIX_INSTALLER_ACCENT_COLOR }}
          AETHERSDR_MSIX_INSTALLER_BACKGROUND_COLOR: ${{ vars.AETHERSDR_MSIX_INSTALLER_BACKGROUND_COLOR }}
        run: |
          . .\packaging\windows\store-identity.ps1
          powershell -NoProfile -ExecutionPolicy Bypass -File packaging\windows\create-msix.ps1 -DeployDir deploy -OutputDir . -CreateUpload -SkipSign -ExcludeDfnrModel

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: Windows-Installer
          path: |
            AetherSDR-*.zip
            AetherSDR-*-setup.exe
            AetherSDR-*.msix
            AetherSDR-*.msixupload

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3
        with:
          # .msixupload is the Partner Center upload artifact (manual Store
          # submission for now — see docs/WINDOWS-STORE-MSIX.md). It's a
          # maintainer-only package; the raw .msix is intentionally left off
          # the public release because CI builds it unsigned (-SkipSign) and
          # an unsigned .msix can't be sideloaded by end users. The .msix is
          # still kept in the upload-artifact step for maintainer inspection.
          # The MSIX step is continue-on-error, so this glob may match nothing
          # on a failed build; softprops skips unmatched globs rather than
          # failing the release.
          files: |
            AetherSDR-*.zip
            AetherSDR-*-setup.exe
            AetherSDR-*.msixupload

      # ----------------------------------------------------------------------
      # Automated Microsoft Store submission (weekly release cycle).
      #
      # Runs ONLY on a v* tag push, and ONLY when the AETHERSDR_STORE_PRODUCT_ID
      # repository VARIABLE is set. PRs, branch workflow_dispatch runs, and forks
      # never touch Partner Center because (a) the tag-ref guard, (b) the
      # product-Id guard, and (c) forks have no access to the repo secrets.
      #
      # The submission is staged as a DRAFT (publish-store.ps1 passes
      # --noCommit): the package uploads to Partner Center but certification is
      # NOT started. A maintainer reviews the pending submission and clicks
      # "Submit to Store". CI never publishes to the live channel on its own.
      #
      # Free-product only (AetherSDR qualifies). The app must already be live in
      # the Store. One-time Entra/Partner Center setup is in
      # docs/WINDOWS-STORE-MSIX.md.
      # ----------------------------------------------------------------------
      - name: Setup Microsoft Store Developer CLI
        if: startsWith(github.ref, 'refs/tags/') && vars.AETHERSDR_STORE_PRODUCT_ID != ''
        uses: microsoft/microsoft-store-apppublisher@15abd1c50fcc164b19cb240fb04ef3c49bf715a2  # v1.1

      - name: Stage Microsoft Store submission (draft)
        if: startsWith(github.ref, 'refs/tags/') && vars.AETHERSDR_STORE_PRODUCT_ID != ''
        env:
          AZURE_AD_TENANT_ID: ${{ secrets.AZURE_AD_TENANT_ID }}
          AZURE_AD_APPLICATION_CLIENT_ID: ${{ secrets.AZURE_AD_APPLICATION_CLIENT_ID }}
          AZURE_AD_APPLICATION_SECRET: ${{ secrets.AZURE_AD_APPLICATION_SECRET }}
          SELLER_ID: ${{ secrets.SELLER_ID }}
          AETHERSDR_STORE_PRODUCT_ID: ${{ vars.AETHERSDR_STORE_PRODUCT_ID }}
        run: |
          msstore reconfigure `
            --tenantId $env:AZURE_AD_TENANT_ID `
            --sellerId $env:SELLER_ID `
            --clientId $env:AZURE_AD_APPLICATION_CLIENT_ID `
            --clientSecret $env:AZURE_AD_APPLICATION_SECRET
          powershell -NoProfile -ExecutionPolicy Bypass -File packaging\windows\publish-store.ps1 -ProductId $env:AETHERSDR_STORE_PRODUCT_ID
